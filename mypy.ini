# =============================================================================
# MyPy 配置 - 静态类型检查
# =============================================================================
# 本文件配置 MyPy 静态类型检查器
# 文档: https://mypy.readthedocs.io/
#
# 创建日期: 2026-04-07
# 最后更新: 2026-04-07
# 维护者: ZHC开发团队
# =============================================================================

[mypy]
# Python版本
python_version = 3.9

# 严格程度设置（渐进式采用策略）
warn_return_any = True           # 返回值缺少类型注解时警告
warn_unused_configs = True       # 未使用的配置项警告
warn_redundant_casts = True      # 冗余的类型转换警告
warn_unused_ignores = True       # 未使用的# type: ignore警告
warn_unreachable = True          # 不可达代码警告

# 错误处理
disallow_untyped_defs = False    # 暂时不强制所有函数都有类型注解（Phase 2目标）
disallow_incomplete_defs = True  # 不完整的类型定义禁止
check_untyped_defs = True        # 即使没有类型注解也检查函数内部
disallow_untyped_decorators = False  # 暂不强制装饰器类型

# 隐式可选和None检查
no_implicit_optional = True      # 禁止隐式Optional
strict_optional = True

# 其他选项
show_error_codes = True          # 显示错误代码便于忽略
show_column_numbers = True       # 显示列号
pretty = True                    # 美化输出
color_output = True              # 彩色输出
error_summary = True             # 显示错误摘要
incremental = True               # 增量模式加速检查

# 排除目录
exclude = (?x)(
    tests/archived/
    | build/
    | dist/
    | \.venv/
    | __pycache__/
    )

# =============================================================================
# 模块特定配置
# =============================================================================

# 测试模块 - 放宽类型检查要求
[mypy-tests.*]
disallow_untyped_defs = False
check_untyped_defs = False

# 第三方库（缺少类型存根）
[mypy-pytest]
ignore_missing_imports = True

[mypy-setuptools]
ignore_missing_imports = True

# =============================================================================
# 使用说明
# =============================================================================
# 
# 1️⃣ 运行类型检查：
#    mypy src/
# 
# 2️⃣ 检查特定文件：
#    mypy src/parser.py
# 
# 3️⃣ 显示详细错误信息：
#    mypy src/ --show-traceback
# 
# 4️⃣ 生成HTML报告：
#    mypy src/ --html-report mypy-report/
# 
# 5️⃣ 忽略特定错误（在代码中使用）：
#    some_code()  # type: ignore[error-code]
# 
# ⚠️ 注意事项：
# - 本配置采用渐进式策略，Phase 2 将收紧 disallow_untyped_defs
# - 测试代码暂时放宽类型检查要求
# - 第三方库缺少类型存根时使用 ignore_missing_imports
# 
# =============================================================================
