# =============================================================================
# ZHC 项目 CI/CD 工作流
# =============================================================================
# 本工作流在每次 push 和 pull request 时自动运行代码质量检查
# 包括：代码格式检查、Linting、类型检查、单元测试
#
# 创建日期: 2026-04-07
# 最后更新: 2026-04-07
# 维护者: ZHC开发团队
# =============================================================================

name: ZHC CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality-check:
    name: 代码质量检查
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. 设置 Python 环境
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      
      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy pytest pytest-cov
          # 如果项目有其他依赖，安装开发依赖
          if [ -f pyproject.toml ]; then pip install -e ".[dev]"; fi
      
      # 4. Black 格式检查
      - name: Check code formatting with Black
        run: black --check src/ tests/ scripts/
      
      # 5. Ruff Linting
      - name: Lint with Ruff
        run: ruff check src/ tests/ scripts/
      
      # 6. MyPy 类型检查
      - name: Type check with MyPy
        run: mypy src/ --config-file mypy.ini
      
      # 7. 运行测试
      - name: Run tests with pytest
        run: pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=60
      
      # 8. 上传覆盖率报告（可选）
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

