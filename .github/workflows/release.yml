# =============================================================================
# ZHC 发布工作流
# =============================================================================
# 当创建新的 release 时自动运行
# 包括：版本检查、CHANGELOG 生成、发布验证
#
# 创建日期: 2026-04-08
# 维护者: ZHC开发团队
# =============================================================================

name: Release

on:
  release:
    types: [created]

env:
  PYTHON_VERSION: '3.9'

jobs:
  # ===========================================================================
  # 发布前检查
  # ===========================================================================
  pre-release-check:
    name: 发布前检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 2. 设置 Python 环境
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy pytest pytest-cov
          if [ -f pyproject.toml ]; then pip install -e ".[dev]"; fi
      
      # 4. 代码质量检查
      - name: Run quality checks
        run: |
          black --check src/ tests/ scripts/
          ruff check src/ tests/ scripts/
          mypy src/ --config-file mypy.ini || true
      
      # 5. 运行测试
      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-fail-under=50
      
      # 6. 版本号检查
      - name: Check version consistency
        run: |
          # 从 tag 获取版本号
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Tag version: $TAG_VERSION"
          
          # 从代码获取版本号
          CODE_VERSION=$(python -c "import sys; sys.path.insert(0, 'src'); from __init__ import __version__; print(__version__)")
          echo "Code version: $CODE_VERSION"
          
          # 比较版本号
          if [ "$TAG_VERSION" != "$CODE_VERSION" ]; then
            echo "❌ 版本号不一致！Tag: $TAG_VERSION, Code: $CODE_VERSION"
            exit 1
          fi
          
          echo "✅ 版本号一致: $TAG_VERSION"

  # ===========================================================================
  # 生成 CHANGELOG
  # ===========================================================================
  generate-changelog:
    name: 生成 CHANGELOG
    runs-on: ubuntu-latest
    needs: pre-release-check
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # 2. 设置 Python 环境
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      # 3. 生成 CHANGELOG
      - name: Generate CHANGELOG
        run: |
          # 获取上一个 tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          
          echo "Previous tag: $PREV_TAG"
          echo "Current tag: $CURRENT_TAG"
          
          # 生成 CHANGELOG
          if [ -n "$PREV_TAG" ]; then
            python scripts/generate_changelog.py --from "$PREV_TAG" --to "$CURRENT_TAG" --version "${CURRENT_TAG#v}"
          else
            python scripts/generate_changelog.py --to "$CURRENT_TAG" --version "${CURRENT_TAG#v}"
          fi
      
      # 4. 提交 CHANGELOG
      - name: Commit CHANGELOG
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for ${GITHUB_REF#refs/tags/}" || echo "No changes to commit"
          git push

  # ===========================================================================
  # 构建和发布
  # ===========================================================================
  build-and-publish:
    name: 构建和发布
    runs-on: ubuntu-latest
    needs: [pre-release-check, generate-changelog]
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. 设置 Python 环境
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      # 3. 安装构建工具
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      
      # 4. 构建包
      - name: Build package
        run: python -m build
      
      # 5. 检查包
      - name: Check package
        run: twine check dist/*
      
      # 6. 上传构建产物
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: 30
      
      # 7. 发布到 PyPI（可选）
      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     password: ${{ secrets.PYPI_API_TOKEN }}

  # ===========================================================================
  # 发布通知
  # ===========================================================================
  notify:
    name: 发布通知
    runs-on: ubuntu-latest
    needs: [build-and-publish]
    if: success()
    
    steps:
      - name: Create release notes
        run: |
          echo "## 🎉 Release ${GITHUB_REF#refs/tags/} Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Completed Tasks" >> $GITHUB_STEP_SUMMARY
          echo "- Code quality checks passed" >> $GITHUB_STEP_SUMMARY
          echo "- Tests passed" >> $GITHUB_STEP_SUMMARY
          echo "- CHANGELOG generated" >> $GITHUB_STEP_SUMMARY
          echo "- Package built successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Source distribution (sdist)" >> $GITHUB_STEP_SUMMARY
          echo "- Built distribution (wheel)" >> $GITHUB_STEP_SUMMARY